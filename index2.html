<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeRent Pro | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50">

    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <span class="font-bold text-blue-600 flex items-center gap-2"><i data-lucide="bike"></i> ProRent</span>
            <div class="space-x-4">
                <button onclick="showPage('booking')" class="text-sm font-semibold hover:text-blue-600">New Rental</button>
                <button onclick="showPage('calendar')" class="text-sm font-semibold hover:text-blue-600">Availability Calendar</button>
            </div>
        </div>
    </nav>

    <div id="page-booking" class="max-w-2xl mx-auto p-8">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <h2 class="text-2xl font-bold mb-6">Rent a Bike</h2>
            <form id="rental-form" class="space-y-4">
                <label class="label">Type</label>
                <select id="bike-type" class="input-field">
                    <option value="classic">Classic (10 available)</option>
                    <option value="electric">Electric (5 available)</option>
                </select>
                
                <label class="label">Duration</label>
                <select id="duration" class="input-field">
                    <option value="2">2 Hour Tour</option>
                    <option value="24">24 Hours</option>
                    <option value="168">Full Week</option>
                </select>

                <label class="label">Start Date/Time (10am - 7pm)</label>
                <input type="datetime-local" id="start-time" class="input-field" required>
                
                <button type="submit" class="btn-primary mt-4">Check & Book</button>
            </form>
        </div>
    </div>

    <div id="page-calendar" class="max-w-4xl mx-auto p-8 hidden">
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
            <div id="calendar"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
