<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeRent Pro | 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50">

    <nav class="bg-white border-b border-slate-200 p-4 sticky top-0 z-50">
        <div class="max-w-5xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 font-bold text-blue-600">
                <i data-lucide="bike"></i> <span>BikeRent Pro</span>
            </div>
            <div class="flex gap-6">
                <button onclick="showPage('booking')" class="nav-link">New Rental</button>
                <button onclick="showPage('calendar')" class="nav-link">Availability Calendar</button>
            </div>
        </div>
    </nav>

    <main id="page-booking" class="page-container max-w-2xl mx-auto py-10 px-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
            <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
                <i data-lucide="plus-circle" class="text-blue-500"></i> Create Rental
            </h2>
            
            <form id="rental-form" class="space-y-5">
                <div>
                    <label class="label">Bike Type</label>
                    <select id="bike-type" class="input-field">
                        <option value="classic">Classic (Max 10)</option>
                        <option value="electric">Electric (Max 5)</option>
                    </select>
                </div>

                <div>
                    <label class="label">Duration</label>
                    <select id="duration" class="input-field">
                        <option value="2">2 Hour Tour</option>
                        <option value="4">Half Day (4h)</option>
                        <option value="8">Full Day (8h)</option>
                        <option value="24">24 Hours</option>
                        <option value="48">2-Day</option>
                        <option value="72">3-Day</option>
                        <option value="168">Full Week</option>
                    </select>
                </div>

                <div>
                    <label class="label">Start Date & Time (10:00 - 19:00)</label>
                    <input type="datetime-local" id="start-time" class="input-field" required>
                </div>

                <button type="submit" class="btn-primary">Verify & Book Bike</button>
            </form>
        </div>
    </main>

    <main id="page-calendar" class="page-container max-w-5xl mx-auto py-10 px-4 hidden">
        <div class="bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
            <div class="mb-4 flex justify-between items-center">
                <h2 class="text-xl font-bold">Fleet Schedule</h2>
                <button onclick="clearBookings()" class="text-xs text-red-500 hover:underline">Clear All Data</button>
            </div>
            <div id="calendar-el"></div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
